<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Controle de vendas, metas e comissões">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <meta name="color-scheme" content="dark">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="LevelUp Vendas">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LevelUp Vendas">

  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="48x48" href="icons/Icon-48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">

  <title>LevelUp Vendas</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --surface: #11151d;
      --surface-2: #171c26;
      --line: #242b36;
      --text: #ffffff;
      --muted: #b6c2d3;
      --neon: #39f0ae;
      --blue: #6cc7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    #levelup-splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 30%, rgba(57, 240, 174, 0.12), transparent 32%),
        linear-gradient(180deg, #0d1118 0%, #050816 100%);
      z-index: 9999;
      transition: opacity 280ms ease, visibility 280ms ease;
    }

    #levelup-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-card {
      width: min(360px, 100%);
      display: grid;
      justify-items: center;
      gap: 18px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.015));
      box-shadow: 0 24px 80px rgba(57, 240, 174, 0.10);
    }

    .splash-icon {
      width: 82px;
      height: 82px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--neon), var(--blue));
      box-shadow: 0 18px 45px rgba(57, 240, 174, 0.24);
    }

    .splash-icon img {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 24px;
    }

    .splash-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .splash-subtitle {
      margin: -8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .splash-loader {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .splash-loader::before {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--neon), var(--blue));
      animation: levelup-load 1.15s ease-in-out infinite;
    }

    @keyframes levelup-load {
      0% {
        transform: translateX(-110%);
      }
      100% {
        transform: translateX(250%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #levelup-splash,
      .splash-loader::before {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="levelup-splash" aria-label="Carregando LevelUp Vendas">
    <div class="splash-card">
      <div class="splash-icon">
        <img src="icons/Icon-192.png" alt="">
      </div>
      <h1 class="splash-title">LevelUp Vendas</h1>
      <p class="splash-subtitle">Carregando metas, vendas e desafios</p>
      <div class="splash-loader"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('levelup-splash');
      if (splash) {
        splash.classList.add('hidden');
        window.setTimeout(function () {
          splash.remove();
        }, 320);
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.ready.catch(function () {});
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
